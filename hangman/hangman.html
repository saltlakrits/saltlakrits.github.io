<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="../sandbox.css" />

    <meta charset="UTF-8">

    <title>
        My Sandbox

<body>

    <div class="window">
        <div class="contentDiv">
            <button id="showNav">☰</button>

            <h1>Hangman&#128516</h1>

            <div class="hangmanOutput">
                <div id="hangmanOutput">
                    Sample
                </div>
                <div id="hangmanSecondary"></div>
            </div>

            <div>
                <form id="hangmanForm">
                    <label id="hangmanInputLabel" for="hangmanInput">Enter your guess: </label>

                </form>
            </div>
            <div>
                <button id="playAgainButton" type="button" onclick="reInitialize()">Play again?</button>
                <!-- style="display:none;" by default -->
            </div>

        </div>
        <div id="nav" class="nav closed">
            <button type="button" onclick="window.open('../index.html', '_top')" class="navButton">Home</button>
            <button type="button" onclick="window.open('hangman.html', '_top')" class="navButton">Hangman</button>
            <button type="button" onclick="window.open('../canvas/canvas.html', '_top')"
                class="navButton">Canvas</button>
        </div>



    </div>

    <script src="hangman.js"></script>
</body>

</html>
